

pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def path = properties.getProperty("flutter.sdk")
        assert path != null, "flutter.sdk not set in local.properties"
        return path
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.13.2" apply false
    id "org.jetbrains.kotlin.android" version "2.3.21" apply false
}

def getFlutterSdkPath() {
    def properties = new Properties()
    file("local.properties").withInputStream { properties.load(it) }
    def path = properties.getProperty("flutter.sdk")
    assert path != null, "flutter.sdk not set in local.properties"
    return path
}

static def getFlutterEngineRealm(flutterSdkPath) {
    def realmFile = new File(flutterSdkPath, "bin/cache/engine.realm")
    if (realmFile.exists()) {
        def realm = realmFile.text.trim()
        return realm.isEmpty() ? "" : realm + "/"
    }
    return ""
}

def sdkPath = getFlutterSdkPath()
def engineRealm = getFlutterEngineRealm(sdkPath)

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven {
            url "https://storage.googleapis.com/${engineRealm}download.flutter.io"
        }
    }
}

rootProject.name = 'flutter_torrent'