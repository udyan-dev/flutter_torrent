buildscript {
    ext.kotlin_version = "2.3.21"
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.13.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace = "com.ironfist.flutter_torrent"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

/*
    externalNativeBuild {
        cmake {
            path = "../lib/src/CMakeLists.txt"
            version = "4.1.2"
        }
    }
*/

    defaultConfig {
        minSdk = 26

/*
        externalNativeBuild {
            cmake {
                arguments "-DCMAKE_BUILD_TYPE=Release",
                        "-DVCPKG_TARGET_ANDROID=ON",
                        "-DANDROID_STL=c++_shared",
                        "-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON"

                abiFilters "arm64-v8a", "armeabi-v7a", "x86_64", "x86"

                cFlags "-O3 -ffunction-sections -fdata-sections -fvisibility=hidden -DNDEBUG -D_GNU_SOURCE"
                cppFlags "-O3 -ffunction-sections -fdata-sections -fvisibility=hidden -fvisibility-inlines-hidden -DNDEBUG"
            }
        }
*/
    }

    sourceSets {
        main {
            java.srcDirs += "src/main/kotlin"
            jniLibs.srcDirs = ["src/main/jniLibs"]
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            ndk {
                debugSymbolLevel 'NONE'
            }
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    packagingOptions {
        resources {
            excludes += ["**/*.map", "**/*.debug", "**/*.pdb", "META-INF/*"]
        }
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

